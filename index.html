<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sand: #f5f2ed;
  --sand2: #ede9e2;
  --sand3: #e0dbd2;
  --ink: #1a1814;
  --ink2: #4a4540;
  --ink3: #8a8278;
  --ink4: #b8b2a8;

  --kaya: #2d5a3d;
  --kaya-light: #e8f0eb;
  --kaya-mid: #4a8a5e;
  --samba: #8b4513;
  --samba-light: #f5ede6;
  --samba-mid: #c4722a;

  --accent: #2d5a3d;
  --accent-light: #e8f0eb;
  --accent-mid: #4a8a5e;
  --wa: #128c47;
  --wa-light: #e6f5ec;

  --s0-bg: #f0eee8; --s0-text: #9a9488; --s0-dot: #c8c2b8;
  --s1-bg: #e8f0f8; --s1-text: #3a6898; --s1-dot: #5a8ec8;
  --s2-bg: #eef6f0; --s2-text: #2d6840; --s2-dot: #4a9860;
  --s3-bg: #fdf4e3; --s3-text: #8a6010; --s3-dot: #c89028;
  --s4-bg: #f5eef8; --s4-text: #6a3898; --s4-dot: #9a58c8;
  --s5-bg: #e3f5ee; --s5-text: #1a6848; --s5-dot: #28a868;

  --radius: 12px;
  --radius-sm: 7px;
}

body { font-family: 'Geist', sans-serif; background: var(--sand); color: var(--ink); min-height: 100vh; font-size: 14px; line-height: 1.5; }

/* HEADER */
.header { background: white; border-bottom: 1px solid var(--sand3); padding: 0 24px; display: flex; align-items: center; gap: 16px; height: 56px; position: sticky; top: 0; z-index: 100; }

.brand { display: flex; align-items: baseline; gap: 8px; flex-shrink: 0; }
.brand-name { font-family: 'Instrument Serif', serif; font-size: 18px; color: var(--ink); }
.brand-sep { width: 1px; height: 14px; background: var(--sand3); }
.brand-sub { font-size: 11px; color: var(--ink3); font-weight: 400; letter-spacing: 0.04em; text-transform: uppercase; }

/* PIPELINE TOGGLE */
.pipeline-toggle { display: flex; background: var(--sand); border-radius: 8px; padding: 3px; gap: 2px; flex-shrink: 0; }
.pipeline-btn { padding: 5px 14px; border-radius: 6px; border: none; font-family: 'Geist', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; color: var(--ink3); background: transparent; }
.pipeline-btn.active-kaya { background: var(--kaya); color: white; }
.pipeline-btn.active-samba { background: var(--samba); color: white; }
.pipeline-btn:not(.active-kaya):not(.active-samba):hover { color: var(--ink); background: var(--sand2); }

.header-controls { display: flex; align-items: center; gap: 8px; flex: 1; }
.search-wrap { flex: 1; max-width: 260px; position: relative; }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--ink4); font-size: 13px; pointer-events: none; }
.search { width: 100%; height: 34px; background: var(--sand); border: 1px solid var(--sand3); border-radius: 7px; padding: 0 10px 0 30px; font-family: 'Geist', sans-serif; font-size: 13px; color: var(--ink); outline: none; transition: border-color 0.15s, background 0.15s; }
.search:focus { background: white; border-color: var(--accent-mid); }
.search::placeholder { color: var(--ink4); }

.btn-discover { height: 34px; padding: 0 12px; background: var(--accent-light); border: 1px solid var(--accent-mid); border-radius: 7px; font-family: 'Geist', sans-serif; font-size: 12px; font-weight: 500; color: var(--accent); cursor: pointer; transition: all 0.12s; flex-shrink: 0; }
.btn-discover:hover { background: var(--accent); color: white; }
.btn-discover.samba-mode { background: var(--samba-light); border-color: var(--samba-mid); color: var(--samba); }
.btn-discover.samba-mode:hover { background: var(--samba); color: white; }

.btn-add { height: 34px; padding: 0 14px; background: var(--accent); border: none; border-radius: 7px; font-family: 'Geist', sans-serif; font-size: 13px; font-weight: 500; color: white; cursor: pointer; transition: opacity 0.12s; flex-shrink: 0; }
.btn-add:hover { opacity: 0.88; }
.btn-add.samba-mode { background: var(--samba); }

/* SUMMARY BAR */
.summary-bar { background: white; border-bottom: 1px solid var(--sand3); padding: 8px 24px; display: flex; align-items: center; gap: 6px; overflow-x: auto; flex-wrap: wrap; }
.stat-chip { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1.5px solid transparent; transition: all 0.12s; white-space: nowrap; }
.stat-chip:hover { opacity: 0.8; }
.stat-chip.active { border-color: currentColor; }
.stat-dot { width: 6px; height: 6px; border-radius: 50%; }

/* QUICK ADD BAR */
.quick-add-bar { background: white; border-bottom: 1px solid var(--sand3); padding: 8px 24px; display: flex; align-items: center; gap: 8px; }
.quick-add-label { font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink4); white-space: nowrap; flex-shrink: 0; }
.quick-add-input { height: 34px; background: var(--sand); border: 1px solid var(--sand3); border-radius: var(--radius-sm); padding: 0 10px; font-family: 'Geist', sans-serif; font-size: 13px; color: var(--ink); outline: none; transition: border-color 0.15s; }
.quick-add-input:focus { background: white; border-color: var(--accent-mid); }
.quick-add-input::placeholder { color: var(--ink4); }
.quick-add-input.wa { width: 175px; }
.quick-add-input.name { width: 150px; }
.quick-add-input.agency { width: 160px; }
.quick-add-sep { font-size: 11px; color: var(--ink4); flex-shrink: 0; }
.quick-add-btn { height: 34px; padding: 0 14px; background: var(--wa); border: none; border-radius: var(--radius-sm); font-family: 'Geist', sans-serif; font-size: 12px; font-weight: 500; color: white; cursor: pointer; transition: opacity 0.12s; flex-shrink: 0; }
.quick-add-btn:hover { opacity: 0.88; }
.quick-add-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.quick-add-feedback { font-size: 12px; color: var(--accent-mid); flex-shrink: 0; opacity: 0; transition: opacity 0.2s; }
.quick-add-feedback.show { opacity: 1; }

/* PROJECT TABS (KAYA) */
.proj-bar { background: white; border-bottom: 1px solid var(--sand3); padding: 0 24px; display: flex; align-items: center; overflow-x: auto; }
.proj-tab { padding: 11px 14px; font-size: 12px; font-weight: 500; color: var(--ink3); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: all 0.12s; display: flex; align-items: center; gap: 5px; }
.proj-tab:hover { color: var(--ink); }
.proj-tab.active { color: var(--kaya); border-bottom-color: var(--kaya); }
.proj-tab.active.samba { color: var(--samba); border-bottom-color: var(--samba); }
.proj-tab-count { background: var(--sand2); border-radius: 10px; padding: 1px 6px; font-size: 10px; color: var(--ink3); }
.proj-tab.active .proj-tab-count { background: var(--accent-light); color: var(--kaya); }
.proj-tab.active.samba .proj-tab-count { background: var(--samba-light); color: var(--samba); }

/* RESULTS BAR */
.results-bar { padding: 10px 24px 6px; display: flex; align-items: center; justify-content: space-between; }
.results-count { font-size: 12px; color: var(--ink3); }
.view-toggle { display: flex; gap: 4px; }
.view-btn { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 6px; border: 1px solid var(--sand3); background: white; cursor: pointer; color: var(--ink3); font-size: 14px; transition: all 0.12s; }
.view-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
.view-btn.active.samba { background: var(--samba); border-color: var(--samba); }

/* CARD GRID */
.card-grid { padding: 4px 24px 40px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }
.card-grid.list-mode { grid-template-columns: 1fr; }

/* AGENT CARD */
.agent-card { background: white; border: 1px solid var(--sand3); border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: box-shadow 0.15s, transform 0.12s, border-color 0.15s; }
.agent-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.07); transform: translateY(-1px); }

.card-top { padding: 14px 16px 10px; display: flex; align-items: flex-start; gap: 10px; }
.avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--sand2); display: flex; align-items: center; justify-content: center; font-family: 'Instrument Serif', serif; font-size: 15px; color: var(--ink2); flex-shrink: 0; font-style: italic; }
.card-info { flex: 1; min-width: 0; }
.card-name { font-size: 14px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-name.unnamed { color: var(--ink3); font-weight: 400; font-style: italic; }
.card-agency { font-size: 12px; color: var(--ink3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }

.wa-pill { display: inline-flex; align-items: center; gap: 4px; padding: 5px 9px; background: var(--wa-light); color: var(--wa); border-radius: 20px; font-size: 11px; font-weight: 600; text-decoration: none; flex-shrink: 0; transition: background 0.12s; }
.wa-pill:hover { background: #d4eddf; }
.wa-pill.none { background: var(--sand); color: var(--ink4); pointer-events: none; }
.wa-pill svg { width: 12px; height: 12px; }

/* KAYA coverage */
.coverage-section { padding: 0 16px 10px; }
.coverage-label { font-size: 10px; color: var(--ink4); font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; }
.proj-dots { display: flex; flex-direction: column; gap: 4px; }
.proj-dot-row { display: flex; align-items: center; gap: 6px; }
.proj-dot-label { font-size: 11px; color: var(--ink3); width: 108px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.proj-status-pill { display: inline-flex; align-items: center; gap: 4px; padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: 500; flex-shrink: 0; }
.pdot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.proj-link-icon { margin-left: auto; color: var(--ink4); font-size: 10px; text-decoration: none; flex-shrink: 0; }
.proj-link-icon:hover { color: var(--kaya); }

/* SAMBA coverage */
.samba-coverage { padding: 0 16px 10px; }
.samba-status-row { display: flex; align-items: center; gap: 8px; }
.samba-status-label { font-size: 11px; color: var(--ink3); }

/* DUAL BADGE (for All view) */
.dual-badges { display: flex; gap: 6px; padding: 0 16px 10px; flex-wrap: wrap; }
.pipeline-badge { display: flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 10px; font-size: 10px; font-weight: 500; }
.pipeline-badge.kaya-badge { background: var(--kaya-light); color: var(--kaya); }
.pipeline-badge.samba-badge { background: var(--samba-light); color: var(--samba); }

/* CARD FOOTER */
.card-footer { padding: 8px 16px; border-top: 1px solid var(--sand2); display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.card-notes { font-size: 11px; color: var(--ink3); font-style: italic; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.listed-count { font-size: 11px; font-weight: 600; color: var(--s5-text); background: var(--s5-bg); padding: 2px 8px; border-radius: 10px; flex-shrink: 0; }

/* EMPTY */
.empty-state { grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: var(--ink3); }
.empty-state h3 { font-size: 15px; margin-bottom: 6px; }

/* DRAWER */
.overlay { display: none; position: fixed; inset: 0; background: rgba(26,24,20,0.45); z-index: 200; align-items: flex-start; justify-content: flex-end; backdrop-filter: blur(2px); }
.overlay.open { display: flex; }
.drawer { background: white; width: 500px; max-width: 100vw; height: 100vh; overflow-y: auto; box-shadow: -8px 0 32px rgba(0,0,0,0.12); display: flex; flex-direction: column; }
.drawer-header { padding: 18px 22px 14px; border-bottom: 1px solid var(--sand2); display: flex; align-items: flex-start; gap: 12px; position: sticky; top: 0; background: white; z-index: 10; }
.drawer-avatar { width: 42px; height: 42px; border-radius: 50%; background: var(--sand2); display: flex; align-items: center; justify-content: center; font-family: 'Instrument Serif', serif; font-size: 16px; font-style: italic; color: var(--ink2); flex-shrink: 0; }
.drawer-title-wrap { flex: 1; }
.drawer-name { font-size: 16px; font-weight: 600; color: var(--ink); }
.drawer-agency { font-size: 12px; color: var(--ink3); margin-top: 2px; }
.drawer-close { background: var(--sand); border: none; border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--ink2); font-size: 15px; transition: background 0.12s; flex-shrink: 0; }
.drawer-close:hover { background: var(--sand2); }
.drawer-body { padding: 18px 22px; flex: 1; }
.drawer-footer { padding: 12px 22px; border-top: 1px solid var(--sand2); display: flex; gap: 8px; justify-content: flex-end; position: sticky; bottom: 0; background: white; }

.section-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink4); margin-bottom: 10px; }

.pipeline-section { border-radius: var(--radius-sm); border: 1px solid var(--sand3); padding: 14px; margin-bottom: 16px; }
.pipeline-section.kaya-section { border-color: #c8ddd0; background: #fafcfb; }
.pipeline-section.samba-section { border-color: #e8cdb8; background: #fdf8f5; }
.pipeline-section-title { font-size: 12px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.pipeline-section-title.kaya { color: var(--kaya); }
.pipeline-section-title.samba { color: var(--samba); }
.pipeline-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.form-full { grid-column: 1 / -1; }
.field-label { font-size: 11px; color: var(--ink3); margin-bottom: 4px; font-weight: 500; }
.field-input, .field-select, .field-textarea { width: 100%; background: var(--sand); border: 1px solid var(--sand3); border-radius: var(--radius-sm); padding: 7px 10px; font-family: 'Geist', sans-serif; font-size: 13px; color: var(--ink); outline: none; transition: border-color 0.12s; }
.field-input:focus, .field-select:focus, .field-textarea:focus { background: white; border-color: var(--accent-mid); }
.field-select { appearance: none; cursor: pointer; }
.field-textarea { resize: vertical; min-height: 60px; }

/* Project table */
.proj-table { border: 1px solid var(--sand3); border-radius: var(--radius-sm); overflow: hidden; margin-bottom: 14px; }
.proj-table-row { display: grid; grid-template-columns: 130px 1fr 28px; align-items: center; padding: 9px 12px; border-bottom: 1px solid var(--sand2); transition: background 0.1s; }
.proj-table-row:last-child { border-bottom: none; }
.proj-table-row:hover { background: var(--sand); }
.proj-table-name { font-size: 12px; font-weight: 500; color: var(--ink2); display: flex; align-items: center; gap: 5px; }
.personal-badge { font-size: 9px; background: var(--sand2); color: var(--ink4); padding: 1px 5px; border-radius: 4px; }
.proj-table-status select { background: none; border: none; font-family: 'Geist', sans-serif; font-size: 12px; color: var(--ink2); cursor: pointer; outline: none; width: 100%; }
.proj-table-link { display: flex; align-items: center; justify-content: center; color: var(--ink4); font-size: 13px; cursor: pointer; border-radius: 4px; transition: color 0.12s; }
.proj-table-link:hover { color: var(--kaya); }
.url-row { display: none; padding: 0 12px 9px; border-bottom: 1px solid var(--sand2); background: var(--sand); }
.url-row.open { display: block; }
.url-row:last-child { border-bottom: none; }

/* Samba status */
.samba-status-select { width: 100%; background: var(--sand); border: 1px solid var(--sand3); border-radius: var(--radius-sm); padding: 8px 10px; font-family: 'Geist', sans-serif; font-size: 13px; color: var(--ink); outline: none; appearance: none; cursor: pointer; margin-bottom: 10px; }
.samba-status-select:focus { background: white; border-color: var(--samba-mid); }

/* WA section */
.wa-section { background: var(--sand); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 14px; }
.wa-msg-preview { font-size: 12px; color: var(--ink2); line-height: 1.65; white-space: pre-wrap; font-family: 'Geist', sans-serif; }
.wa-open-btn { display: inline-flex; align-items: center; gap: 6px; margin-top: 10px; padding: 7px 13px; background: var(--wa); color: white; border: none; border-radius: var(--radius-sm); font-family: 'Geist', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; text-decoration: none; transition: opacity 0.12s; }
.wa-open-btn:hover { opacity: 0.88; }
.wa-open-btn.disabled { background: var(--sand3); color: var(--ink3); pointer-events: none; }

.btn-secondary { height: 34px; padding: 0 14px; background: white; border: 1px solid var(--sand3); border-radius: var(--radius-sm); font-family: 'Geist', sans-serif; font-size: 13px; color: var(--ink2); cursor: pointer; transition: border-color 0.12s; }
.btn-secondary:hover { border-color: var(--ink3); }
.btn-primary { height: 34px; padding: 0 18px; background: var(--accent); border: none; border-radius: var(--radius-sm); font-family: 'Geist', sans-serif; font-size: 13px; font-weight: 500; color: white; cursor: pointer; transition: opacity 0.12s; }
.btn-primary:hover { opacity: 0.88; }
.btn-primary.samba { background: var(--samba); }

/* DISCOVER PANEL */
.discover-overlay { display: none; position: fixed; inset: 0; background: rgba(26,24,20,0.45); z-index: 300; align-items: flex-start; justify-content: flex-end; backdrop-filter: blur(2px); }
.discover-overlay.open { display: flex; }
.discover-panel { background: white; width: 540px; max-width: 100vw; height: 100vh; overflow-y: auto; box-shadow: -8px 0 32px rgba(0,0,0,0.12); display: flex; flex-direction: column; }
.discover-header { padding: 18px 22px 14px; border-bottom: 1px solid var(--sand2); position: sticky; top: 0; background: white; z-index: 10; }
.discover-title { font-size: 15px; font-weight: 600; color: var(--ink); margin-bottom: 3px; }
.discover-sub { font-size: 12px; color: var(--ink3); }
.discover-body { padding: 18px 22px; flex: 1; }

.area-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.area-card { border: 1.5px solid var(--sand3); border-radius: var(--radius-sm); padding: 11px 13px; cursor: pointer; transition: all 0.12s; }
.area-card:hover { border-color: var(--accent-mid); }
.area-card.selected { border-color: var(--accent); background: var(--accent-light); }
.area-card.selected.samba { border-color: var(--samba); background: var(--samba-light); }
.area-card-title { font-size: 13px; font-weight: 500; color: var(--ink); }
.area-card-sub { font-size: 11px; color: var(--ink3); margin-top: 2px; }

.discover-run-btn { width: 100%; height: 38px; background: var(--accent); border: none; border-radius: var(--radius-sm); font-family: 'Geist', sans-serif; font-size: 13px; font-weight: 500; color: white; cursor: pointer; transition: opacity 0.12s; margin-bottom: 16px; }
.discover-run-btn:hover { opacity: 0.88; }
.discover-run-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.discover-run-btn.samba { background: var(--samba); }

.discover-status { font-size: 12px; color: var(--ink3); margin-bottom: 10px; display: none; align-items: center; gap: 8px; }
.discover-status.show { display: flex; }
.spinner { width: 13px; height: 13px; border: 2px solid var(--sand3); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
.spinner.samba { border-top-color: var(--samba); }
@keyframes spin { to { transform: rotate(360deg); } }

.results-list { display: flex; flex-direction: column; gap: 8px; }
.result-card { border: 1px solid var(--sand3); border-radius: var(--radius-sm); padding: 11px 13px; display: flex; align-items: flex-start; gap: 10px; cursor: pointer; transition: all 0.12s; }
.result-card.selected { border-color: var(--accent); background: var(--accent-light); }
.result-card.selected.samba { border-color: var(--samba); background: var(--samba-light); }
.result-card.duplicate { opacity: 0.45; pointer-events: none; }
.result-check { width: 17px; height: 17px; border: 1.5px solid var(--sand3); border-radius: 4px; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: white; background: white; transition: all 0.12s; }
.result-card.selected .result-check { background: var(--accent); border-color: var(--accent); }
.result-card.selected.samba .result-check { background: var(--samba); border-color: var(--samba); }
.result-info { flex: 1; min-width: 0; }
.result-name { font-size: 13px; font-weight: 500; color: var(--ink); }
.result-meta { font-size: 11px; color: var(--ink3); margin-top: 2px; }
.result-phone { font-size: 11px; color: var(--accent-mid); font-family: monospace; margin-top: 3px; }
.result-dup-badge { font-size: 10px; background: var(--sand2); color: var(--ink3); padding: 2px 7px; border-radius: 10px; flex-shrink: 0; }

.discover-footer { padding: 12px 22px; border-top: 1px solid var(--sand2); display: flex; gap: 8px; align-items: center; position: sticky; bottom: 0; background: white; }
.discover-import-btn { height: 34px; padding: 0 18px; background: var(--accent); border: none; border-radius: var(--radius-sm); font-family: 'Geist', sans-serif; font-size: 13px; font-weight: 500; color: white; cursor: pointer; transition: opacity 0.12s; }
.discover-import-btn:hover { opacity: 0.88; }
.discover-import-btn:disabled { opacity: 0.4; cursor: not-allowed; }

function loadAgents() {
  try { const s = localStorage.getItem('kaya_samba_crm_v3'); if (s) agents = JSON.parse(s); } catch(e) {}
}
function saveAgents() {
  try { localStorage.setItem('kaya_samba_crm_v3', JSON.stringify(agents)); } catch(e) {}
}
loadAgents();

function getWaNum(a) {
  if (a.wa_url && a.wa_url.startsWith('https://wa.me/')) return a.wa_url.replace('https://wa.me/','').replace(/\D/g,'');
  return a.wa_num ? a.wa_num.replace(/\D/g,'') : '';
}
function buildWaUrl(num) { return num ? 'https://wa.me/' + num.replace(/\D/g,'') : ''; }
function initials(name, agency) {
  const src = (name || agency || '').trim();
  const words = src.split(/\s+/).filter(Boolean);
  if (words.length >= 2) return (words[0][0] + words[1][0]).toUpperCase();
  if (words.length === 1) return words[0].slice(0,2).toUpperCase();
  return '?';
}

function getStatuses() { return pipeline === 'kaya' ? KAYA_STATUSES : SAMBA_STATUSES; }

function bestKayaStatus(a) {
  const proj = activeProjFilter !== 'All' ? activeProjFilter : null;
  if (proj) return a.projects[proj]?.status || 'Not contacted';
  let best = 'Not contacted';
  KAYA_PROJECTS.forEach(p => {
    const s = a.projects[p]?.status || 'Not contacted';
    if (KAYA_STATUSES.indexOf(s) > KAYA_STATUSES.indexOf(best)) best = s;
  });
  return best;
}

function getSambaStatus(a) { return a.samba?.status || 'Not contacted'; }

function getCurrentStatus(a) {
  return pipeline === 'kaya' ? bestKayaStatus(a) : getSambaStatus(a);
}

function listedCount(a) {
  return KAYA_PROJECTS.filter(p => a.projects[p]?.status === 'Listed').length;
}

function pillHtml(status) {
  const c = S_CFG[status] || S_CFG['Not contacted'];
  return `<span class="proj-status-pill" style="background:${c.bg};color:${c.text}">
    <span class="pdot" style="background:${c.dot}"></span>${c.short}
  </span>`;
}

// PIPELINE SWITCH
function setPipeline(p) {
  pipeline = p;
  activeStatusFilter = '';
  activeProjFilter = 'All';

  const isKaya = p === 'kaya';
  document.getElementById('brandName').textContent = isKaya ? 'KAYA' : 'Samba';
  document.getElementById('brandSub').textContent = isKaya ? 'Sales CRM' : 'Rentals CRM';
  document.getElementById('btnKaya').className = 'pipeline-btn' + (isKaya ? ' active-kaya' : '');
  document.getElementById('btnSamba').className = 'pipeline-btn' + (!isKaya ? ' active-samba' : '');

  const accentVar = isKaya ? 'var(--kaya)' : 'var(--samba)';
  document.documentElement.style.setProperty('--accent', isKaya ? '#2d5a3d' : '#8b4513');
  document.documentElement.style.setProperty('--accent-light', isKaya ? '#e8f0eb' : '#f5ede6');
  document.documentElement.style.setProperty('--accent-mid', isKaya ? '#4a8a5e' : '#c4722a');

  document.getElementById('discoverBtn').className = 'btn-discover' + (!isKaya ? ' samba-mode' : '');
  document.getElementById('addBtn').className = 'btn-add' + (!isKaya ? ' samba-mode' : '');
  document.getElementById('drawerSaveBtn').className = 'btn-primary' + (!isKaya ? ' samba' : '');

  render();
}

// STATS
function getStats() {
  const statuses = getStatuses();
  const counts = {};
  statuses.forEach(s => counts[s] = 0);
  const valid = agents.filter(a => a.name || a.agency || getWaNum(a));
  valid.forEach(a => {
    const s = getCurrentStatus(a);
    if (counts[s] !== undefined) counts[s]++;
  });
  return { counts, total: valid.length };
}

function renderSummaryBar() {
  const { counts } = getStats();
  const statuses = getStatuses();
  let html = '';
  statuses.forEach(s => {
    const c = S_CFG[s] || S_CFG['Not contacted'];
    html += `<button class="stat-chip ${activeStatusFilter === s ? 'active' : ''}" style="background:${c.bg};color:${c.text}" onclick="toggleStatusFilter('${s}')">
      <span class="stat-dot" style="background:${c.dot}"></span>
      <strong>${counts[s] || 0}</strong>&nbsp;${s}
    </button>`;
  });
  document.getElementById('summaryBar').innerHTML = html;
}

function renderProjBar() {
  const bar = document.getElementById('projBar');
  if (pipeline === 'samba') {
    bar.innerHTML = '';
    return;
  }
  const tabs = ['All', ...KAYA_PROJECTS];
  bar.innerHTML = tabs.map(p => {
    const isAll = p === 'All';
    const isP = PERSONAL.includes(p);
    const count = isAll
      ? agents.filter(a => a.name || a.agency).length
      : agents.filter(a => (a.name || a.agency) && a.projects[p]?.status === 'Listed').length;
    const isSamba = pipeline === 'samba';
    return `<div class="proj-tab ${activeProjFilter === p ? 'active' : ''} ${isSamba ? 'samba' : ''}" onclick="setProjFilter('${p}')">
      ${isAll ? 'All agents' : p}${isP ? ' *' : ''}
      <span class="proj-tab-count">${count}</span>
    </div>`;
  }).join('');
}

function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const result = agents.filter(a => {
    if (!a.name && !a.agency && !getWaNum(a)) return false;
    if (q) { const h = (a.name + ' ' + a.agency + ' ' + (a.notes||'')).toLowerCase(); if (!h.includes(q)) return false; }
    if (activeStatusFilter) {
      if (getCurrentStatus(a) !== activeStatusFilter) return false;
    }
    return true;
  });

  const sort = document.getElementById('sortSelect')?.value || 'default';
  if (sort === 'activity') {
    result.sort((a, b) => (b.activity_score || 0) - (a.activity_score || 0));
  } else if (sort === 'name') {
    result.sort((a, b) => (a.name || a.agency || '').localeCompare(b.name || b.agency || ''));
  } else if (sort === 'agency') {
    result.sort((a, b) => (a.agency || a.name || '').localeCompare(b.agency || b.name || ''));
  }
  return result;
}

    const ini = initials(a.name, a.agency);
    const lc = listedCount(a);

          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          WA
        </a>`
      : `<span class="wa-pill none">No WA</span>`;

    let coverageHtml = '';
    if (pipeline === 'kaya') {
      const projRows = projs.map(p => {
        const proj = a.projects[p] || { status: 'Not contacted', url: '' };
        const isP = PERSONAL.includes(p);
        const hasUrl = proj.url && proj.url.startsWith('http');
        return `<div class="proj-dot-row">
          <span class="proj-dot-label">${p}${isP ? ' *' : ''}</span>
          ${pillHtml(proj.status)}
          ${hasUrl ? `<a class="proj-link-icon" href="${proj.url}" target="_blank" onclick="event.stopPropagation()">↗</a>` : ''}

    } else {
      const ss = getSambaStatus(a);

      coverageHtml = `<div class="samba-coverage">
        <div class="coverage-label">Rental status</div>
        <div class="samba-status-row">
          ${pillHtml(ss)}
          ${kayaBest !== 'Not contacted' ? `<span style="font-size:10px;color:var(--ink4)">Also: KAYA ${kayaBest}</span>` : ''}
        </div>
      </div>`;

    return `<div class="agent-card" onclick="openDrawer(${a.id})">

      </div>

  }).join('');
}


function activityBadge(a) {
  const tier = a.activity_tier || 'Inactive';
  const cfg = {
    'High':     { bg:'#e3f5ee', text:'#1a6848', label:'High activity' },
    'Medium':   { bg:'#fdf4e3', text:'#8a6010', label:'Medium' },
    'Low':      { bg:'#f0eee8', text:'#9a9488', label:'Low' },
    'Inactive': { bg:'#f5eef8', text:'#9a78b4', label:'No response' },
  };
  const c = cfg[tier] || cfg['Inactive'];
  if (tier === 'Medium' || tier === 'Low' || tier === 'Inactive') return '';
  return `<span class="listed-count" style="background:${c.bg};color:${c.text}">${c.label}</span>`;
}

function render() {
  renderSummaryBar();
  renderProjBar();
  renderCards();
}

function toggleStatusFilter(s) {

}

function setProjFilter(p) {

}

function setView(v) {

// DRAWER

  editingId = id;

  const sambaMsg = SAMBA_MSG(a.name);
  const kayaMsgUrl = waUrl ? waUrl + '?text=' + encodeURIComponent(kayaMsg) : '';
  const sambaMsgUrl = waUrl ? waUrl + '?text=' + encodeURIComponent(sambaMsg) : '';

    const proj = a.projects[p] || { status: 'Not contacted', url: '' };

        <div><div class="field-label">Alternate contact</div><input class="field-input" type="text" id="df_alt" value="${a.alt_contact||''}"></div>
        <div class="form-full"><div class="field-label">General notes</div><textarea class="field-textarea" id="df_notes">${a.notes||''}</textarea></div>
      </div>
    </div>

    <div class="pipeline-section kaya-section" style="margin-bottom:14px">
      <div class="pipeline-section-title kaya">
        <span class="pipeline-dot" style="background:var(--kaya)"></span>
        KAYA Sales pipeline
      </div>
      <div class="proj-table" style="margin-bottom:12px">${projRows}</div>
      <div class="wa-section">
        <div class="section-label" style="margin-bottom:6px">KAYA outreach message</div>
        <div class="wa-msg-preview" id="kayaMsgPreview">${kayaMsg}</div>
        <a class="wa-open-btn ${!waUrl?'disabled':''}" href="${kayaMsgUrl||'#'}" target="_blank" ${!waUrl?'onclick="return false"':''}>Open in WhatsApp</a>
      </div>
    </div>

    <div class="pipeline-section samba-section">
      <div class="pipeline-section-title samba">
        <span class="pipeline-dot" style="background:var(--samba)"></span>
        Samba Rentals pipeline
      </div>
      <div class="field-label">Rental status</div>
      <select class="samba-status-select" id="df_samba_status">${sambaOpts}</select>
      <div class="field-label">Samba notes</div>
      <textarea class="field-textarea" id="df_samba_notes" style="margin-bottom:12px">${a.samba?.notes||''}</textarea>

        <div class="section-label" style="margin-bottom:6px">Samba outreach message</div>
        <div class="wa-msg-preview" id="sambaMsgPreview">${sambaMsg}</div>

      </div>

  document.getElementById('df_name').addEventListener('input', function() {

function toggleUrlRow(k) {
  document.getElementById('ur_' + k)?.classList.toggle('open');
}

function closeDrawer() { document.getElementById('overlay').classList.remove('open'); editingId = null; }
function closeOverlay(e) { if (e.target === document.getElementById('overlay')) closeDrawer(); }

function saveDrawer() {
  if (!editingId) return;
  const a = agents.find(x => x.id === editingId);
  if (!a) return;
  a.name = document.getElementById('df_name').value.trim();
  a.agency = document.getElementById('df_agency').value.trim();
  const waNum = document.getElementById('df_wa').value.replace(/\D/g,'');
  a.wa_num = waNum; a.wa_url = waNum ? buildWaUrl(waNum) : '';
  a.alt_contact = document.getElementById('df_alt').value.trim();
  a.notes = document.getElementById('df_notes').value.trim();
  if (!a.samba) a.samba = { status: 'Not contacted', notes: '' };
  a.samba.status = document.getElementById('df_samba_status').value;
  a.samba.notes = document.getElementById('df_samba_notes').value.trim();
  KAYA_PROJECTS.forEach(p => {
    const k = p.replace(/ /g,'_');
    const se = document.getElementById('ps_' + k);
    const ue = document.getElementById('pu_' + k);
    if (se) a.projects[p].status = se.value;
    if (ue) a.projects[p].url = ue.value.trim();
  });
  saveAgents(); closeDrawer(); render();
}

function openAddModal() {
  const newId = Math.max(0, ...agents.map(x => x.id)) + 1;
  agents.push({ id: newId, name: '', agency: '', wa_url: '', wa_num: '', alt_contact: '', notes: '',
    projects: Object.fromEntries(KAYA_PROJECTS.map(p => [p, { status: 'Not contacted', url: '' }])),
    samba: { status: 'Not contacted', notes: '' }
  });
  saveAgents(); openDrawer(newId);
}

// QUICK ADD
function qaValidate() {
  const wa = document.getElementById('qaWa').value.replace(/\D/g,'');
  document.getElementById('qaBtn').disabled = wa.length < 8;
}
function qaKeydown(e) { if (e.key === 'Enter') quickAdd(); }
function quickAdd() {
  const waRaw = document.getElementById('qaWa').value.replace(/\D/g,'');
  if (waRaw.length < 8) return;
  const name = document.getElementById('qaName').value.trim();
  const agency = document.getElementById('qaAgency').value.trim();
  const exists = agents.find(a => a.wa_num === waRaw);
  const fb = document.getElementById('qaFeedback');
  if (exists) {
    fb.textContent = 'Already in CRM'; fb.style.color = 'var(--ink3)';
    fb.classList.add('show'); setTimeout(() => fb.classList.remove('show'), 2000); return;
  }
  const newId = Math.max(0, ...agents.map(x => x.id)) + 1;
  agents.push({ id: newId, name, agency, wa_url: 'https://wa.me/'+waRaw, wa_num: waRaw, alt_contact: '', notes: '',
    projects: Object.fromEntries(KAYA_PROJECTS.map(p => [p, { status: 'Not contacted', url: '' }])),
    samba: { status: 'Not contacted', notes: '' }
  });
  saveAgents(); render();
  document.getElementById('qaWa').value = '';
  document.getElementById('qaName').value = '';
  document.getElementById('qaAgency').value = '';
  document.getElementById('qaBtn').disabled = true;
  fb.textContent = 'Added!'; fb.style.color = 'var(--accent-mid)';
  fb.classList.add('show'); setTimeout(() => fb.classList.remove('show'), 2000);
  document.getElementById('qaWa').focus();
}

// DISCOVER
function openDiscoverPanel() {
  const isSamba = pipeline === 'samba';
  document.getElementById('discoverTitle').textContent = isSamba ? 'Discover rental agents' : 'Discover sales agents';
  document.getElementById('discoverRunBtn').className = 'discover-run-btn' + (isSamba ? ' samba' : '');
  document.getElementById('discoverSpinner').className = 'spinner' + (isSamba ? ' samba' : '');
  document.querySelectorAll('.area-card.selected').forEach(c => { if (isSamba) c.classList.add('samba'); else c.classList.remove('samba'); });
  document.getElementById('discoverImportBtn').className = 'discover-import-btn' + (isSamba ? ' samba' : '');
  document.getElementById('discoverOverlay').classList.add('open');
}
function closeDiscoverPanel() { document.getElementById('discoverOverlay').classList.remove('open'); }
function closeDiscoverOutside(e) { if (e.target === document.getElementById('discoverOverlay')) closeDiscoverPanel(); }

function toggleArea(area) {
  if (selectedAreas.has(area)) { if (selectedAreas.size > 1) selectedAreas.delete(area); }
  else selectedAreas.add(area);
  document.getElementById('area-canggu').classList.toggle('selected', selectedAreas.has('canggu'));
  document.getElementById('area-uluwatu').classList.toggle('selected', selectedAreas.has('uluwatu'));
}

async function runDiscover() {
  const btn = document.getElementById('discoverRunBtn');
  const status = document.getElementById('discoverStatus');
  const statusText = document.getElementById('discoverStatusText');
  const resultsDiv = document.getElementById('discoverResults');
  const footer = document.getElementById('discoverFooter');

  btn.disabled = true; btn.textContent = 'Searching...';
  status.classList.add('show'); resultsDiv.innerHTML = '';
  footer.style.display = 'none'; discoverResults = []; selectedResults = new Set();

  let queries = [];
  selectedAreas.forEach(area => queries = queries.concat(AREA_QUERIES[area]));
  statusText.textContent = 'Starting Apify scraper...';

  try {
    const startRes = await fetch(
      'https://api.apify.com/v2/acts/' + APIFY_ACTOR + '/runs?token=' + APIFY_TOKEN,
      { method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ searchStringsArray: queries, maxCrawledPlacesPerSearch: 20, language: 'en', countryCode: 'id' }) }
    );
    if (!startRes.ok) throw new Error('Failed to start scraper: ' + startRes.status);
    const runId = (await startRes.json()).data.id;
    statusText.textContent = 'Scraping Google Maps... this takes 2-3 minutes';

    let done = false, attempts = 0;
    while (!done && attempts < 60) {
      await new Promise(r => setTimeout(r, 5000)); attempts++;
      const poll = await (await fetch('https://api.apify.com/v2/actor-runs/' + runId + '?token=' + APIFY_TOKEN)).json();
      statusText.textContent = 'Scraping Google Maps... (' + (attempts * 5) + 's)';
      if (poll.data.status === 'SUCCEEDED') done = true;
      else if (['FAILED','ABORTED'].includes(poll.data.status)) throw new Error('Scraper failed');
    }
    if (!done) throw new Error('Timed out');

    statusText.textContent = 'Processing results...';
    const items = await (await fetch('https://api.apify.com/v2/actor-runs/' + runId + '/dataset/items?token=' + APIFY_TOKEN + '&limit=400')).json();

    const seen = new Set();
    const existingPhones = new Set(agents.map(a => a.wa_num).filter(Boolean));
    const existingNames = new Set(agents.map(a => a.agency?.toLowerCase()).filter(Boolean));

    discoverResults = [];
    items.forEach(item => {
      if (!item.title) return;
      const name = item.title.trim();
      const phone = item.phone ? item.phone.replace(/\D/g,'') : '';
      const key = name.toLowerCase() + '|' + phone;
      if (seen.has(key)) return;
      seen.add(key);
      const isDuplicate = (phone && existingPhones.has(phone)) || existingNames.has(name.toLowerCase());
      discoverResults.push({ name, phone, address: item.address || '', website: item.website || '',
        rating: item.totalScore ? item.totalScore.toFixed(1) : '', reviews: item.reviewsCount || 0, isDuplicate });
    });

    discoverResults.sort((a, b) => a.isDuplicate !== b.isDuplicate ? (a.isDuplicate ? 1 : -1) : b.reviews - a.reviews);
    const newCount = discoverResults.filter(r => !r.isDuplicate).length;
    statusText.textContent = `Found ${discoverResults.length} agencies — ${newCount} new, ${discoverResults.length - newCount} already in CRM`;
    discoverResults.forEach((r, i) => { if (!r.isDuplicate) selectedResults.add(i); });
    renderDiscoverResults();
    footer.style.display = 'flex';
  } catch(err) {
    statusText.textContent = 'Error: ' + err.message;
    btn.disabled = false; btn.textContent = 'Try again'; return;
  }
  btn.disabled = false; btn.textContent = 'Search again';
}

function renderDiscoverResults() {
  const isSamba = pipeline === 'samba';
  document.getElementById('discoverResults').innerHTML = discoverResults.map((r, i) => {
    const sel = selectedResults.has(i);
    return `<div class="result-card ${sel?'selected':''} ${r.isDuplicate?'duplicate':''} ${isSamba&&sel?'samba':''}" onclick="toggleResult(${i})" id="result-${i}">
      <div class="result-check">${sel?'✓':''}</div>
      <div class="result-info">
        <div class="result-name">${r.name}</div>
        <div class="result-meta">${r.address||'Bali'}${r.rating?' · '+r.rating+' ★ ('+r.reviews+')':''}</div>
        ${r.phone?`<div class="result-phone">+${r.phone}</div>`:`<div class="result-meta" style="color:var(--ink4);font-style:italic">No phone found</div>`}
      </div>
      ${r.isDuplicate?'<span class="result-dup-badge">Already in CRM</span>':''}
    </div>`;
  }).join('');
  updateImportBtn();
}

function toggleResult(i) {
  if (discoverResults[i]?.isDuplicate) return;
  if (selectedResults.has(i)) selectedResults.delete(i); else selectedResults.add(i);
  const card = document.getElementById('result-' + i);
  const isSamba = pipeline === 'samba';
  card.classList.toggle('selected', selectedResults.has(i));
  if (isSamba) card.classList.toggle('samba', selectedResults.has(i));
  card.querySelector('.result-check').textContent = selectedResults.has(i) ? '✓' : '';
  updateImportBtn();
}

function selectAllResults() {
  discoverResults.forEach((r, i) => { if (!r.isDuplicate) selectedResults.add(i); });
  renderDiscoverResults();
}

function updateImportBtn() {
  const count = selectedResults.size;
  const btn = document.getElementById('discoverImportBtn');
  btn.textContent = count > 0 ? `Import ${count} agent${count!==1?'s':''}` : 'Import selected';
  btn.disabled = count === 0;
}

function importSelected() {
  const existingPhones = new Set(agents.map(a => a.wa_num).filter(Boolean));
  let nextId = Math.max(0, ...agents.map(x => x.id)) + 1;
  let imported = 0;
  selectedResults.forEach(i => {
    const r = discoverResults[i];
    if (!r || r.isDuplicate) return;
    if (r.phone && existingPhones.has(r.phone)) return;
    if (r.phone) existingPhones.add(r.phone);
    agents.push({ id: nextId++, name: '', agency: r.name, wa_url: r.phone?'https://wa.me/'+r.phone:'',
      wa_num: r.phone||'', alt_contact: '', notes: r.website?'Website: '+r.website:'',
      projects: Object.fromEntries(KAYA_PROJECTS.map(p => [p, { status: 'Not contacted', url: '' }])),
      samba: { status: 'Not contacted', notes: '' }
    });
    imported++;
  });
  saveAgents(); closeDiscoverPanel(); render();
  discoverResults = []; selectedResults = new Set();
  document.getElementById('discoverResults').innerHTML = '';
  document.getElementById('discoverFooter').style.display = 'none';
  document.getElementById('discoverStatus').classList.remove('show');
  document.getElementById('discoverRunBtn').disabled = false;
  document.getElementById('discoverRunBtn').textContent = 'Search Google Maps';
  if (imported > 0) alert(imported + ' new agents imported!');
}

render();
</script>
