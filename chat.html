// ── Swipe-to-reply + long-press (delegated on the thread body) ────────
function setupThreadGestures() {
  const body = document.getElementById('threadBody');
  if (!body) return;
  let sw = null, timer = null;
  const reset = b => { if (b) { b.classList.remove('swiping'); b.style.transform = ''; b.style.removeProperty('--sw'); } };

  body.addEventListener('touchstart', e => {
    const b = e.target.closest('.bubble[data-id]');
    const wid = b && b.getAttribute('data-id');
    if (!b || !wid) { sw = null; return; }
    sw = { b, wid, x: e.touches[0].clientX, y: e.touches[0].clientY, dx: 0, active: false };
    timer = setTimeout(() => { if (sw && Math.abs(sw.dx) < 8) { openMsgMenu(null, wid); sw = null; } }, 480);
  }, { passive: true });

  body.addEventListener('touchmove', e => {
    if (!sw) return;
    sw.dx = e.touches[0].clientX - sw.x;
    const dy = e.touches[0].clientY - sw.y;
    if (!sw.active) {
      if (sw.dx > 10 && sw.dx > Math.abs(dy)) { sw.active = true; clearTimeout(timer); sw.b.classList.add('swiping'); }
      else if (Math.abs(dy) > 10 || sw.dx < -8) { clearTimeout(timer); reset(sw.b); sw = null; return; }
    }
    if (sw.active) {
      const d = Math.max(0, Math.min(sw.dx, 80));
      sw.b.style.transform = `translateX(${d}px)`;
      sw.b.style.setProperty('--sw', (d / 80).toFixed(2));
    }
  }, { passive: true });

  body.addEventListener('touchend', () => {
    clearTimeout(timer);
    if (sw && sw.active) {
      const trigger = sw.dx > 55;
      sw.b.style.transition = 'transform 0.18s';
      reset(sw.b);
      setTimeout(() => { if (sw && sw.b) sw.b.style.transition = ''; }, 200);
      if (trigger) startReply(sw.wid);
    }
    sw = null;
  }, { passive: true });

  // Desktop: right-click opens the same menu.
  body.addEventListener('contextmenu', e => {
    const b = e.target.closest('.bubble[data-id]');
    const wid = b && b.getAttribute('data-id');
    if (wid) { e.preventDefault(); openMsgMenu(e, wid); }
  });
}

// ── Suggest (Maya draft) ──────────────────────────────────────────────
async function suggest() {
  const id = state.activeId; if (!id) return;
  const box = document.getElementById('replyBox');
  box.disabled = true;
  const prev = box.value;
  box.value = '';
  box.placeholder = 'Maya is thinking…';
  try {
    const data = await api('suggest_reply', { agentId: id });
    if (data.error) throw new Error(data.error);
    box.value = (data.reply || '').trim();
  } catch (e) {
    box.value = prev;
    toast('Suggest failed: ' + e.message);
  }
  box.disabled = false; box.placeholder = 'Type a message';
  autoGrow(box); onReplyInput();
}

// ── Send ──────────────────────────────────────────────────────────────
async function send() {
  const id = state.activeId; if (!id) return;
  if (id === ASSIST_ID) return sendAssistant();
  const owner = activeOwner();
  if (owner) return sendOwner(owner);
  const a = state.agents.find(x => x.id === id); if (!a) return;
  const box = document.getElementById('replyBox');
  const msg = box.value.trim();
  if (!msg) return;
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  const replyTo = state.replyTarget?.waMessageId || null;
  try {
    const r = await fetch('/api/whatsapp-send', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ waNum: getWaNum(a), message: msg, agentId: a.id, source: 'manual', ...(replyTo ? { replyTo } : {}) }),
    });
    const res = await r.json();
    if (!res.success) throw new Error(res.error || 'send failed');
    box.value = ''; autoGrow(box);
    localStorage.removeItem('maya_draft_' + a.id);
    clearReply();
    document.getElementById('emojiPop').style.display = 'none';
    document.getElementById('qrPop').style.display = 'none';
    // Send any listing cards Maya attached to this draft (best-effort — the
    // text is already out either way).
    const cardSlugs = (state.draftCards || []).slice(0, 4);
    state.draftCards = [];
    if (cardSlugs.length) {
      try {
        const cr = await fetch('/api/whatsapp-send', { method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'cards', waNum: getWaNum(a), agentId: a.id, slugs: cardSlugs, source: 'manual' }) });
        const cres = await cr.json();
        if (!cres.success) toast('Listing cards failed: ' + (cres.error || 'not sent'));
      } catch (e2) { toast('Listing cards failed: ' + e2.message); }
    }
    // A manual reply pauses Maya for this agent (matches the main CRM).
    pauseMayaAfterManual(a);
    await refreshThread(true);
    refreshAll();
  } catch (e) {
    toast('Send failed: ' + e.message);
  }
  btn.disabled = false;
}

async function resumeMaya(id) {
  const a = state.agents.find(x => x.id === id); if (!a) return;
  if (!confirm('Resume Maya for this conversation? She will auto-reply to the next message based on the global mode.')) return;
  a.automation_override = null;
  await api('patch_agent', { id, fields: { automation_override: null } }).catch(() => {});
  renderBanner(a); renderList();
  toast('Maya resumed');
}

// ── UI helpers ────────────────────────────────────────────────────────
function autoGrow(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
function lightbox(src) {
  const o = document.createElement('div');
  o.className = 'lightbox';
  o.onclick = () => o.remove();
  o.innerHTML = `<img src="${src}">`;
  document.body.appendChild(o);
}
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// Enter-to-send on physical keyboards; Shift+Enter = newline. On touch
// devices the on-screen Return key inserts a newline (no keydown hijack).
document.getElementById('replyBox').addEventListener('keydown', e => {
  const touch = window.matchMedia('(pointer: coarse)').matches;
  if (e.key === 'Enter' && !e.shiftKey && !touch) { e.preventDefault(); send(); }
});

// ════════════════════════════════════════════════════════════════════
// Maya Assistant — the pinned boss console. You chat with Maya herself;
// she answers CRM questions and runs actions via /api/supabase action
// 'assistant' (tool loop in lib/assistant.js). Broadcasts come back as
// pending drafts and only go out when you tap the confirm card.
// ════════════════════════════════════════════════════════════════════

const ASSIST_SUGGESTIONS = [
  'Which agents are the most active and responsive lately?',
  'Which agents have not heard about Villa Saturno yet?',
  'Draft a broadcast telling agents about a price drop on one of the villas',
  'Who in the inbox needs my attention right now?',
];

function saveAssistHistory() {
  try {
    if (state.assist.history.length > 60) state.assist.history = state.assist.history.slice(-60);
    localStorage.setItem('maya_assistant_history', JSON.stringify(state.assist.history));
  } catch (_) {}
}

function stripMd(s) { return (s || '').replace(/\*\*/g, ''); }
function mdLite(s) { return esc(s).replace(/\*\*([^*]+)\*\*/g, '<b>$1</b>').replace(/\n/g, '<br>'); }

function assistantRow() {
  const h = state.assist.history;
  const last = h[h.length - 1];
  const snip = state.assist.busy ? 'Maya is working…'
    : last ? (last.role === 'user' ? 'You: ' : '') + stripMd(last.content).slice(0, 60)
    : 'Ask me anything, or tell me to message the agents';
  const time = last?.ts ? timeAgo(new Date(last.ts)) : '';
  return `<div class="conv assistant-row ${state.activeId === ASSIST_ID ? 'active' : ''}" onclick="openAssistant()">
    <div class="avatar">${ic('spark',20)}</div>
    <div class="conv-mid">
      <div class="conv-name">Maya — Assistant</div>
      <div class="conv-snip">${esc(snip)}</div>
    </div>
    <div class="conv-right">
      <span class="conv-time">${time}</span>
      <div class="conv-badges"><span class="pill pill-boss">Boss</span></div>
    </div>
  </div>`;
}

// Hide agent-only chrome (mode picker, archive/translate/search) while the
// assistant thread is open; openConv() restores it.
function setAssistantChrome(on) {
  ['chatModeBar', 'chatModeHint', 'archBtn', 'translateBtn', 'threadSearchBtn'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = on ? 'none' : '';
  });
  document.getElementById('thAvatar').style.background = on ? 'linear-gradient(135deg,#2a6a3a,#3d8a52)' : '';
}

function openAssistant() {
  state.activeId = ASSIST_ID;
  document.getElementById('app').classList.add('show-thread');
  document.getElementById('threadEmpty').style.display = 'none';
  document.getElementById('threadView').style.display = 'flex';
  state.replyTarget = null; renderReplyChip();
  document.getElementById('threadSearch').style.display = 'none';
  document.getElementById('emojiPop').style.display = 'none';
  document.getElementById('qrPop').style.display = 'none';
  setAssistantChrome(true);
  document.getElementById('thAvatar').innerHTML = ic('spark', 18);
  document.getElementById('thName').textContent = 'Maya — Assistant';
  document.getElementById('thSub').textContent = 'Private console — agents never see this';
  document.getElementById('threadBanner').innerHTML = '';
  document.getElementById('replyBox').value = localStorage.getItem('maya_draft_' + ASSIST_ID) || '';
  autoGrow(document.getElementById('replyBox'));
  renderAssistantThread(true);
  renderList();
}

function renderAssistantThread(scroll) {
  if (state.activeId !== ASSIST_ID) return;
  const body = document.getElementById('threadBody');
  const h = state.assist.history;
  const rows = [];
  if (!h.length) {
    rows.push(`<div class="bubble in">Hi Ikiel -- this is our private line. Ask me about the agents, or tell me what to do in the CRM and I'll handle it. Broadcasts always wait for your confirmation before anything goes out.
      <div class="sugg-wrap">${ASSIST_SUGGESTIONS.map((s, i) => `<button class="sugg" onclick="useSuggestion(${i})">${esc(s)}</button>`).join('')}</div></div>`);
  }
  let lastDay = '';
  h.forEach((m, i) => {
    const d = new Date(m.ts || Date.now());
    const day = d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
    if (day !== lastDay) { rows.push(`<div class="day-sep">${daySep(d)}</div>`); lastDay = day; }
    const t = d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
    if (m.role === 'user') {
      rows.push(`<div class="bubble out">${mdLite(m.content)}<span class="bubble-time">${t}</span></div>`);
    } else {
      const act = (m.activity || []).map(a => `<span class="act-chip">${esc(a)}</span>`).join('');
      rows.push(`<div class="bubble in">${act ? `<div style="margin-bottom:5px">${act}</div>` : ''}${mdLite(m.content)}${renderBroadcastCard(m, i)}<span class="bubble-time">${t}</span></div>`);
    }
  });
  if (state.assist.busy) {
    rows.push('<div class="bubble in typing"><span class="tdots"><i></i><i></i><i></i></span>Maya is working…</div>');
  }
  body.innerHTML = rows.join('');
  if (scroll) { body.scrollTop = body.scrollHeight; state.atBottom = true; }
  updateScrollFab();
}

function useSuggestion(i) {
  const box = document.getElementById('replyBox');
  box.value = ASSIST_SUGGESTIONS[i] || '';
  onReplyInput(); box.focus();
}

function renderBroadcastCard(m, i) {
  const b = m.broadcast;
  if (!b) return '';
  if (b.status === 'sent') {
    return `<div class="bcast-card"><span class="bcast-done">✓ Broadcast sent to ${b.sent_count || 0} agent(s)</span>${b.skipped_count ? `<div class="bcast-meta">${b.skipped_count} skipped (outside the 24h window)</div>` : ''}</div>`;
  }
  if (b.status === 'cancelled') {
    return `<div class="bcast-card" style="opacity:.6">✕ Broadcast cancelled — nothing was sent.</div>`;
  }
  const all = b.recipients || [];
  const inW = all.filter(r => r.in_window);
  const outW = all.filter(r => !r.in_window);
  // Template broadcasts deliver to everyone; free-text only inside the 24h window.
  const isTpl = !!b.template;
  const getting = isTpl ? all : inW;
  return `<div class="bcast-card">
    <b>${icm('megaphone',15)} ${esc(b.label || 'Broadcast')} — awaiting your confirmation</b>
    <div class="bcast-msg">${esc(b.message)}${isTpl && b.template.button ? `<span class="bcast-tpl-btn">${icm('link',13)} ${esc(b.template.button.text)} → ${esc(b.template.button.url)}</span>` : ''}</div>
    ${isTpl ? `<div class="bcast-meta">${icm('check',13)} Approved template <b>${esc(b.template.name)}</b> — delivers to all ${all.length} recipients, no 24h-window limit. [first name] is personalized per agent.</div>` : ''}
    <div class="bcast-meta">To: ${esc(getting.slice(0, 10).map(r => r.name).join(', '))}${getting.length > 10 ? ` +${getting.length - 10} more` : ''}</div>
    ${!isTpl && outW.length ? `<div class="bcast-meta">⏱ ${outW.length} outside the 24h window will be skipped: ${esc(outW.slice(0, 6).map(r => r.name).join(', '))}${outW.length > 6 ? '…' : ''}</div>` : ''}
    ${(b.excluded || []).length ? `<div class="bcast-meta">Excluded: ${esc(b.excluded.slice(0, 5).map(x => `${x.name} (${x.reason})`).join(', '))}</div>` : ''}
    <div class="bcast-actions">
      <button class="go" onclick="confirmBroadcast(${i})">Send to ${getting.length} agent${getting.length === 1 ? '' : 's'}</button>
      <button class="no" onclick="cancelBroadcast(${i})">Cancel</button>
    </div>
  </div>`;
}

async function sendAssistant() {
  if (state.assist.busy) return;
  const box = document.getElementById('replyBox');
  const msg = box.value.trim();
  if (!msg) return;
  box.value = ''; autoGrow(box);
  localStorage.removeItem('maya_draft_' + ASSIST_ID);
  state.assist.history.push({ role: 'user', content: msg, ts: new Date().toISOString() });
  saveAssistHistory();
  state.assist.busy = true;
  renderAssistantThread(true); renderList();
  try {
    const apiMsgs = state.assist.history.slice(-24).map(m => ({ role: m.role, content: stripCardText(m) }));
    const data = await api('assistant', { messages: apiMsgs });
    if (!data || data.error) throw new Error(data?.error || 'no response');
    state.assist.history.push({
      role: 'assistant', content: data.reply || '(no reply)', ts: new Date().toISOString(),
      activity: data.activity || [],
      broadcast: data.pending_broadcast ? { ...data.pending_broadcast, status: 'pending' } : null,
    });
  } catch (e) {
    state.assist.history.push({ role: 'assistant', content: 'Something went wrong: ' + e.message + ' -- try again.', ts: new Date().toISOString() });
  }
  state.assist.busy = false;
  saveAssistHistory();
  renderAssistantThread(true); renderList();
}

// What we replay to the API as history — append broadcast outcome so Maya
// knows in later turns whether a draft was actually sent or cancelled.
function stripCardText(m) {
  let c = m.content || '';
  if (m.broadcast) {
    const st = m.broadcast.status;
    c += st === 'sent' ? `\n[broadcast "${m.broadcast.label}" was confirmed and sent to ${m.broadcast.sent_count || 0} agents]`
      : st === 'cancelled' ? `\n[broadcast "${m.broadcast.label}" was cancelled by the user — nothing sent]`
      : `\n[broadcast "${m.broadcast.label}" is still pending user confirmation]`;
  }
  return c;
}

async function confirmBroadcast(i) {
  const m = state.assist.history[i];
  const b = m && m.broadcast;
  if (!b || b.status !== 'pending') return;
  const n = b.template ? (b.recipients || []).length : (b.recipients || []).filter(r => r.in_window).length;
  if (!confirm(`Send this ${b.template ? 'template ' : ''}message to ${n} agent${n === 1 ? '' : 's'} on WhatsApp now?`)) return;
  toast('Sending broadcast…');
  try {
    const data = await api('execute_broadcast', { draftId: b.draft_id });
    if (!data || data.error) throw new Error(data?.error || 'failed');
    b.status = 'sent'; b.sent_count = data.sent; b.skipped_count = data.skipped;
    let summary = `Broadcast "${b.label}" delivered to ${data.sent} agent(s).`;
    if (data.skipped) summary += ` ${data.skipped} skipped (outside the 24h window).`;
    if (data.failed) summary += ` ${data.failed} failed.`;
    state.assist.history.push({ role: 'assistant', content: summary, ts: new Date().toISOString() });
    saveAssistHistory();
    renderAssistantThread(true);
    toast('Broadcast sent ✓');
  } catch (e) {
    toast('Broadcast failed: ' + e.message);
  }
}

function cancelBroadcast(i) {
  const m = state.assist.history[i];
  if (!m || !m.broadcast || m.broadcast.status !== 'pending') return;
  m.broadcast.status = 'cancelled';
  saveAssistHistory();
  renderAssistantThread();
  // Clear the server-side pending draft so a stale confirm can't fire later.
  api('set_settings', { key: 'assistant_pending_broadcast', value: null }).catch(() => {});
  toast('Cancelled — nothing sent');
}

// ════════════════════════════════════════════════════════════════════
// Maya schedule — upcoming scheduled runs (from the cron calendar + live
// pending state) and key stats for past runs (settings.cron_run_log).
// ════════════════════════════════════════════════════════════════════
function openSchedule() {
  document.getElementById('scheduleOverlay').style.display = 'flex';
  loadSchedule();
}
function closeSchedule() { document.getElementById('scheduleOverlay').style.display = 'none'; }

function fmtWita(iso) {
  try { return new Date(iso).toLocaleString('en-GB', { timeZone: 'Asia/Makassar', weekday: 'short', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' }); }
  catch { return iso; }
}
function relDay(iso) {
  const d = new Date(iso), now = new Date();
  const days = Math.round((new Date(d.toDateString()) - new Date(now.toDateString())) / 86400000);
  return days === 0 ? 'today' : days === 1 ? 'tomorrow' : days > 1 ? 'in ' + days + ' days' : days === -1 ? 'yesterday' : Math.abs(days) + ' days ago';
}

async function loadSchedule() {
  const body = document.getElementById('schBody');
  body.innerHTML = '<div class="an-loading">Loading…</div>';
  try {
    const d = await api('get_schedule');
    if (!d || d.error) throw new Error(d?.error || 'no data');
    let html = '';

    html += '<div class="an-section-title">Upcoming</div>';
    for (const run of (d.upcoming || [])) {
      html += `<div class="sch-run">
        <div class="sch-run-head"><span class="sch-run-when">${esc(fmtWita(run.at))}</span><span class="sch-run-rel">${relDay(run.at)}</span></div>
        <div class="sch-run-label">${esc(run.label)}</div>`;
      for (const it of (run.items || [])) {
        html += `<div class="sch-task">
          <span class="sch-task-name">${esc(it.task)}${it.count != null ? ` <span class="sch-count">${it.count}</span>` : ''}</span>
          ${it.detail ? `<span class="sch-task-detail">${esc(it.detail)}</span>` : ''}
        </div>`;
      }
      html += '</div>';
    }

    html += '<div class="an-section-title" style="margin-top:22px">Past runs</div>';
    const past = d.past || [];
    if (!past.length) {
      html += '<div class="sch-empty">No runs logged yet. The first scheduled run will appear here.</div>';
    } else {
      for (const r of past) {
        const stat = (label, v) => (v ? `<span class="sch-stat"><b>${v}</b> ${label}</span>` : '');
        const rev = r.review ? `<span class="sch-stat"><b>${esc(String(r.review))}</b> review</span>` : '';
        const stats = [
          stat('follow-ups', r.followups), stat('welcomes', r.welcomes), stat('drafts sent', r.drafts),
          stat('alerts', r.alerts), stat('digests', r.digests), stat('resumed', r.resumed),
          stat('stalled', r.stalled), r.briefing ? '<span class="sch-stat">briefing ✓</span>' : '', rev,
          r.errors ? `<span class="sch-stat err"><b>${r.errors}</b> err</span>` : '',
        ].filter(Boolean).join('');
        html += `<div class="sch-past">
          <div class="sch-past-head">
            <span class="sch-past-kind">${esc(r.kind || 'run')}${r.suspended ? ' (suspended)' : ''}</span>
            <span class="sch-past-when">${esc(fmtWita(r.at))}</span>
          </div>
          <div class="sch-stats">${stats || '<span class="sch-stat">quiet run</span>'}${r.spend != null ? `<span class="sch-stat spend">$${Number(r.spend).toFixed(2)}</span>` : ''}</div>
        </div>`;
      }
    }
    body.innerHTML = html;
  } catch (e) {
    body.innerHTML = `<div class="an-loading">Couldn't load schedule: ${esc(e.message)}</div>`;
  }
}

// ════════════════════════════════════════════════════════════════════
// Maya self-review — the weekly loop's approval surface. Reads
// get_maya_review; Ikiel approves/rejects lessons + answers questions;
// apply_maya_review merges the approved playbook into Maya's live prompt.
// ════════════════════════════════════════════════════════════════════
const reviewState = { pending: null, decisions: {}, answers: {} };

function openReview() {
  document.getElementById('reviewOverlay').style.display = 'flex';
  loadReview();
}
function closeReview() {
  document.getElementById('reviewOverlay').style.display = 'none';
  refreshReviewBadge();
}

// Show the header dot when there's an undecided review waiting.
async function refreshReviewBadge() {
  try {
    const d = await api('get_maya_review');
    document.getElementById('reviewDot').style.display = (d && d.pending) ? 'block' : 'none';
  } catch { /* silent */ }
}

async function loadReview() {
  const body = document.getElementById('rvBody');
  body.innerHTML = '<div class="an-loading">Loading…</div>';
  document.getElementById('rvApplyBar').style.display = 'none';
  try {
    const d = await api('get_maya_review');
    if (!d || d.error) throw new Error(d?.error || 'no data');
    reviewState.pending = d.pending;
    reviewState.decisions = {};
    reviewState.answers = {};
    renderReview(d);
  } catch (e) {
    body.innerHTML = `<div class="an-loading">Couldn't load review: ${esc(e.message)}</div>`;
  }
}

function renderReview(d) {
  const body = document.getElementById('rvBody');
  const p = d.pending;
  const pb = d.playbook || { lessons: [], facts: [] };
  let html = '';

  if (p) {
    const grade = (p.scoreboard?.grade || '?').toString();
    const gClass = ['A','B','C','D','F'].includes(grade[0]) ? 'g-' + grade[0] : 'g-none';
    html += `<div class="rv-scorecard">
      <div class="rv-grade ${gClass}">${esc(grade)}</div>
      <div class="rv-scoremeta">
        <div class="rv-headline">${esc(p.scoreboard?.headline || 'Weekly review')}</div>
        <div class="rv-scoresub">Week of ${esc(p.week_of)} · ${p.thread_count} conversations · ${p.reply_count} replies · ${p.scoreboard?.issues_found ?? 0} issues</div>
      </div></div>`;

    if (p.lessons?.length) {
      html += `<div class="an-sec-label">Proposed lessons — approve to teach Maya</div>`;
      html += p.lessons.map(l => `
        <div class="rv-card" id="rvc_${l.id}">
          <div class="rv-cardtop">
            <span class="rv-catchip sev-${esc(l.severity||'med')}">${esc(l.category||'')}</span>
          </div>
          <div class="rv-rule">${esc(l.rule)}</div>
          ${l.rationale ? `<div class="rv-rationale">${esc(l.rationale)}</div>` : ''}
          ${l.evidence ? `<div class="rv-evidence">${esc(l.evidence)}</div>` : ''}
          <div class="rv-toggle">
            <button class="rv-tbtn approve" onclick="setDecision('${l.id}','approve')">Approve</button>
            <button class="rv-tbtn reject" onclick="setDecision('${l.id}','reject')">Reject</button>
          </div>
        </div>`).join('');
    }

    if (p.questions?.length) {
      html += `<div class="an-sec-label">Questions for you — answers become facts Maya can quote</div>`;
      html += p.questions.map(q => `
        <div class="rv-card">
          <div class="rv-rule">${esc(q.question)}</div>
          ${q.context ? `<div class="rv-qcontext">${esc(q.context)}${q.agent ? ' · '+esc(q.agent) : ''}</div>` : ''}
          <textarea class="rv-qinput" placeholder="Your answer (leave blank to skip)" oninput="setAnswer('${q.id}', this.value)"></textarea>
        </div>`).join('');
    }

    if (!p.lessons?.length && !p.questions?.length) {
      html += `<div class="rv-empty">Clean week — Maya had no issues worth flagging.<br>Nothing to approve.</div>`;
    } else {
      document.getElementById('rvApplyBar').style.display = 'flex';
    }
  } else {
    html += `<div class="rv-empty">No pending review.<br>Maya reviews her conversations every Sunday.${d.last_decided ? '<br><br>Last applied: week of '+esc(d.last_decided.week_of) : ''}</div>`;
  }

  // Current playbook (what Maya has already learned)
  if (pb.lessons?.length || pb.facts?.length) {
    html += `<div class="an-sec-label">Maya's playbook — v${pb.version||0} (${pb.lessons?.length||0} lessons, ${pb.facts?.length||0} facts)</div>`;
    html += `<div class="rv-card">`;
    html += (pb.lessons||[]).map(l => `<div class="rv-pblesson">${esc(l.rule)}</div>`).join('');
    html += (pb.facts||[]).map(f => `<div class="rv-pblesson"><b>Q:</b> ${esc(f.q)}<br><b>A:</b> ${esc(f.a)}</div>`).join('');
    html += `</div>`;
  }

  // Metrics trend
  if (d.log?.length) {
    html += `<div class="an-sec-label">Recent reviews</div>`;
    html += `<table class="an-table"><thead><tr><th>Week</th><th>Grade</th><th>Approved</th><th>Facts</th><th>Playbook</th></tr></thead><tbody>`;
    html += d.log.map(r => `<tr><td>${esc(r.week_of||'')}</td><td>${esc(r.grade||'')}</td><td>${r.approved||0}</td><td>${r.answered||0}</td><td>${r.playbook_size||0}</td></tr>`).join('');
    html += `</tbody></table>`;
  }

  body.innerHTML = html;
  updateApplySummary();
}

function setDecision(id, choice) {
  const cur = reviewState.decisions[id];
  reviewState.decisions[id] = (cur === choice) ? undefined : choice; // toggle off if re-tapped
  const card = document.getElementById('rvc_' + id);
  const approveBtn = card.querySelector('.rv-tbtn.approve');
  const rejectBtn = card.querySelector('.rv-tbtn.reject');
  const val = reviewState.decisions[id];
  approveBtn.classList.toggle('on', val === 'approve');
  rejectBtn.classList.toggle('on', val === 'reject');
  card.classList.toggle('picked', val === 'approve');
  card.classList.toggle('rejected', val === 'reject');
  updateApplySummary();
}
function setAnswer(id, val) {
  reviewState.answers[id] = val;
  updateApplySummary();
}
function updateApplySummary() {
  const decs = Object.values(reviewState.decisions);
  const approved = decs.filter(v => v === 'approve').length;
  const answered = Object.values(reviewState.answers).filter(v => v && v.trim()).length;
  const el = document.getElementById('rvApplySummary');
  if (el) el.textContent = `${approved} lesson${approved===1?'':'s'} to teach · ${answered} answer${answered===1?'':'s'}`;
}

async function applyReview() {
  const btn = document.getElementById('rvApplyBtn');
  const approve = Object.keys(reviewState.decisions).filter(id => reviewState.decisions[id] === 'approve');
  const reject = Object.keys(reviewState.decisions).filter(id => reviewState.decisions[id] === 'reject');
  const answers = {};
  Object.keys(reviewState.answers).forEach(id => { if (reviewState.answers[id] && reviewState.answers[id].trim()) answers[id] = reviewState.answers[id].trim(); });
  if (!approve.length && !Object.keys(answers).length) {
    toast('Approve at least one lesson or answer a question first'); return;
  }
  btn.disabled = true; btn.textContent = 'Applying…';
  try {
    const out = await api('apply_maya_review', { approve, reject, answers });
    if (out?.error) throw new Error(out.error);
    toast(`Taught Maya ${out.approved} lesson${out.approved===1?'':'s'}${out.answered?` + ${out.answered} fact${out.answered===1?'':'s'}`:''} (playbook v${out.playbook_version})`);
    await loadReview();
    refreshReviewBadge();
  } catch (e) {
    toast('Apply failed: ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = 'Apply to Maya';
  }
}

async function loadAnalytics() {
  const body = document.getElementById('anBody');
  const days = Number(document.getElementById('anRange').value) || 30;
  body.innerHTML = '<div class="an-loading">Loading…</div>';
  try {
    const d = await api('analytics', { days });
    if (!d || d.error) throw new Error(d?.error || 'no data');
    renderAnalytics(d);
  } catch (e) {
    body.innerHTML = `<div class="an-loading">Couldn't load analytics: ${esc(e.message)}</div>`;
  }
}

function renderAnalytics(d) {
  const f = d.funnel || {};
  const base = f.enrolled || 1;
  const pct = n => Math.round((n / base) * 100);
  // Funnel stages (each as a share of enrolled)
  const stages = [
    ['Enrolled', f.enrolled, '#857b6f'],
    ['Messaged', f.messaged, '#3d8a52'],
    ['Read', f.read, '#2a6a3a'],
    ['Replied', f.replied, '#1e6b46'],
    ['Clicked', f.clicked, '#C46E4B'],
    ['Enquired', f.enquired, '#a3502c'],
  ];
  const funnelHtml = stages.map(([name, n, col]) => `
    <div class="an-frow">
      <div class="an-fname">${name}</div>
      <div class="an-ftrack"><div class="an-ffill" style="width:${Math.max(2, pct(n || 0))}%;background:${col}"></div></div>
      <div class="an-fval">${n || 0} <small>${pct(n || 0)}%</small></div>
    </div>`).join('');

  // Per-format read rates
  const maxSent = Math.max(...(d.by_format || []).map(x => x.sent), 1);
  const fmtHtml = (d.by_format || []).map(x => `
    <div class="an-bar">
      <div class="lbl" title="${esc(x.format)}">${esc(x.format.replace(/^samba_/, '').replace(/_/g, ' '))}</div>
      <div class="track"><div class="fill" style="width:${Math.round(x.sent / maxSent * 100)}%;background:#3d8a52"></div></div>
      <div class="num">${x.read_rate != null ? x.read_rate + '%' : '<span class="an-na">—</span>'}</div>
    </div>`).join('');

  // Tiers
  const tierColors = { champion: '#C46E4B', active: '#3f8f63', warm: '#c9a227', dormant: '#9a9a9a', new: '#4d7fd6', unset: '#bbb' };
  const tierMax = Math.max(...Object.values(d.tiers || {}), 1);
  const tierHtml = Object.entries(d.tiers || {}).sort((a, b) => b[1] - a[1]).map(([t, n]) => `
    <div class="an-bar">
      <div class="lbl">${t}</div>
      <div class="track"><div class="fill" style="width:${Math.round(n / tierMax * 100)}%;background:${tierColors[t] || '#999'}"></div></div>
      <div class="num">${n}</div>
    </div>`).join('');

  const ch = d.channels || {};
  const agents = d.top_agents || [];
  const agentRows = agents.slice(0, 20).map(a => `
    <tr>
      <td>${esc(a.name)}</td>
      <td><span class="an-tierchip tier-${a.tier}">${a.tier}</span></td>
      <td>${a.last_reply_days != null ? a.last_reply_days + 'd' : '—'}</td>
      <td>${a.clicks || 0}</td>
      <td>${a.enquiries || 0}</td>
    </tr>`).join('');

  document.getElementById('anBody').innerHTML = `
    <div class="an-sec-label">Engagement funnel · last ${d.window_days} days</div>
    <div class="an-funnel">${funnelHtml}</div>
    <div class="an-note">Read & click figures are still filling in — delivery tracking was wired on 10 Jul and portal click-tracking on 12 Jul, so these climb as new sends land.</div>

    <div class="an-sec-label">Read rate by format</div>
    <div class="an-bars">${fmtHtml || '<div class="an-na">No sends in range.</div>'}</div>

    <div class="an-sec-label">Headline</div>
    <div class="an-tiles">
      <div class="an-tile"><div class="k">Reply rate</div><div class="v">${base ? Math.round((f.replied || 0) / base * 100) : 0}%</div><div class="s">${f.replied || 0} of ${f.enrolled || 0} enrolled</div></div>
      <div class="an-tile"><div class="k">Opt-out</div><div class="v">${(d.opt_out || {}).rate ?? 0}%</div><div class="s">${(d.opt_out || {}).count || 0} agents</div></div>
      <div class="an-tile"><div class="k">Outbound</div><div class="v">${d.outbound_total || 0}</div><div class="s">messages sent</div></div>
      <div class="an-tile"><div class="k">Portal visits</div><div class="v">${(ch.wa_alert_all || 0) + (ch.wa_digest_all || 0)}</div><div class="s">from broadcasts</div></div>
    </div>

    <div class="an-sec-label">Engagement tiers</div>
    <div class="an-bars">${tierHtml}</div>

    <div class="an-sec-label">Most engaged agents</div>
    <table class="an-table">
      <thead><tr><th>Agent</th><th>Tier</th><th>Last reply</th><th>Clicks</th><th>Enq.</th></tr></thead>
      <tbody>${agentRows || '<tr><td colspan="5" class="an-na">No engagement data yet.</td></tr>'}</tbody>
    </table>
    <div class="an-note">Portal data last synced ${d.portal_updated_at ? new Date(d.portal_updated_at).toLocaleString('en-GB', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' }) : 'not yet'} (refreshes daily with the 9am run).</div>
  `;
}

// ── Boot ──────────────────────────────────────────────────────────────
unlock();
</script>
</body>
</html>
